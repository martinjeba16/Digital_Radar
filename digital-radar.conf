# Nginx reverse proxy for Digital Radar API on EC2.
# Install: sudo cp deploy/nginx/digital-radar.conf /etc/nginx/sites-available/digital-radar
# Enable:  sudo ln -s /etc/nginx/sites-available/digital-radar /etc/nginx/sites-enabled/
# SSL:     sudo certbot --nginx -d api.yourdomain.com

upstream digital_radar_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.yourdomain.com;

    # certbot will add HTTPS redirect and SSL blocks

    client_max_body_size 1m;

    location / {
        proxy_pass http://digital_radar_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
